security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: api_login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        # Compendium (game reference data) stays publicly readable, but writes are
        # admin-only. Campaign-domain resources (campaigns/characters/quests/...) are
        # NOT listed here — they enforce ownership via per-operation security.
        - { path: '^/api/(races|profiles|voies|capabilities|creatures|creature_families|creature_voies|equipment|materials|foods|lodgings|mounts|states|families)(/|$)', methods: [POST, PUT, PATCH, DELETE], roles: ROLE_ADMIN }
        - { path: ^/api,       roles: PUBLIC_ACCESS } # Compendium reads stay public; campaign domain is guarded per-operation.
