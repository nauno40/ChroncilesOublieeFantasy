server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API proxy removed as per user request (API is on port 8000)
    # Frontend handles API calls via CORS to proper URL defined in VITE_API_URL
}
