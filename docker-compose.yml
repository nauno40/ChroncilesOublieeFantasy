services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "!ChangeMe!"
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/dev-entrypoint.sh"]
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    environment:
      DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=15&charset=utf8"
      APP_ENV: dev
      APP_SECRET: 5a79a1d82b3d6e5c8f9e0a1b2c3d4e5f
      # Dev : les e-mails (reset mot de passe) sont capturés par Mailpit (UI http://localhost:8025).
      MAILER_DSN: "smtp://mailpit:1025"
    depends_on:
      - database
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # interface web pour lire les e-mails de dev
      - "1025:1025"   # serveur SMTP

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: build
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    command: npm run dev -- --host
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/app/public
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  db-data:
